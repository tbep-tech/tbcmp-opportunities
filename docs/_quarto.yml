project:
  type: book
  output-dir: _book

book:
  title: "TBCMP Opportunity Analysis"
  author: "Tampa Bay Estuary Program"
  date: today
  chapters:
    - index.qmd
    - current_summaries.qmd
    - part: "County Opportunity Maps"
      chapters:
        - oppmap_citrus.qmd
        - oppmap_hernando.qmd
        - oppmap_hillsborough.qmd
        - oppmap_manatee.qmd
        - oppmap_pasco.qmd
        - oppmap_pinellas.qmd
        - oppmap_sarasota.qmd


    - part: "Steps"
      chapters:
        - 01_inputs.qmd
        - 02_current_layers.qmd
        - 03_current_summaries.qmd
        - 04_opportunities_maps.qmd
